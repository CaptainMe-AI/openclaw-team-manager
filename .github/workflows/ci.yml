name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: RuboCop
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: source/dashboard
    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: source/dashboard

      - name: Run RuboCop
        run: bin/rubocop -f github

  security:
    name: Brakeman
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: source/dashboard
    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: source/dashboard

      - name: Run Brakeman
        run: bin/brakeman --no-pager

  rspec:
    name: RSpec
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: source/dashboard
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    env:
      RAILS_ENV: test
      DATABASE_HOST: localhost
      DATABASE_PORT: "5432"
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libpq-dev

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: source/dashboard

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: source/dashboard/package-lock.json

      - name: Install npm dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build frontend assets
        run: bin/vite build

      - name: Prepare test database
        run: bin/rails db:test:prepare

      - name: Run RSpec
        run: bin/rspec --format documentation

  jest:
    name: Jest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: source/dashboard
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: source/dashboard/package-lock.json

      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Run Jest
        run: npx jest --ci --coverage

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: source/dashboard
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    env:
      RAILS_ENV: test
      DATABASE_HOST: localhost
      DATABASE_PORT: "5432"
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libpq-dev

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: source/dashboard

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: source/dashboard/package-lock.json

      - name: Install npm dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Prepare test database
        run: bin/rails db:test:prepare

      - name: Build frontend assets
        run: bin/vite build

      - name: Start Rails server
        run: |
          bin/rails server -p 5017 &
          timeout 30 bash -c 'until curl -sf http://127.0.0.1:5017 > /dev/null 2>&1; do sleep 1; done'

      - name: Run Playwright tests
        run: npx playwright test --config=e2e/playwright.config.js --project=chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@v5
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: source/dashboard/playwright-report/
          retention-days: 7

      - name: Upload test traces
        uses: actions/upload-artifact@v5
        if: failure()
        with:
          name: playwright-traces
          path: source/dashboard/test-results/
          retention-days: 7
