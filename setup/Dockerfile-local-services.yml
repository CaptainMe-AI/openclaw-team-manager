services:
  db:
    container_name: "openclaw-team-manager-psql"
    hostname: openclaw-team-manager.psql.dev
    environment:
      - POSTGRES_HOST_AUTH_METHOD=trust
      - POSTGRES_PASSWORD=openclaw-team-manager-password
      - POSTGRES_USER=openclaw-team-manager
    image: "arm64v8/postgres:17.5"
    ports:
      - "5411:5432"
    volumes:
      - openclaw-team-manager-psql:/usr/local/DockerDB

