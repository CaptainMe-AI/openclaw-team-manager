# ElasticMQ Configuration for Active Snap AI Test Environment
# This file configures the local SQS emulator for testing Shoryuken workers
#
# Documentation: https://github.com/softwaremill/elasticmq
#
# Usage:
#   docker-compose -f setup/Dockerfile-local-services.yml up -d elasticmq
#
# Access:
#   - SQS API: http://localhost:9324
#   - Web UI:  http://localhost:9325

include classpath("application.conf")

# Node address configuration
node-address {
    protocol = http
    host = localhost
    port = 9324
    context-path = ""
}

# REST SQS configuration
rest-sqs {
    enabled = true
    bind-port = 9324
    bind-hostname = "0.0.0.0"
    sqs-limits = strict
}

# REST Stats (Web UI)
rest-stats {
    enabled = true
    bind-port = 9325
    bind-hostname = "0.0.0.0"
}

# FIFO Queue Definitions
# These queues match the production queue names with .fifo suffix
# All queues are configured as FIFO with content-based deduplication disabled
# (MessageDeduplicationId must be provided explicitly)
queues {
    # Critical priority queue - for payment processing, critical operations
    "activesnap-critical.fifo" {
        defaultVisibilityTimeout = 30 seconds
        delay = 0 seconds
        receiveMessageWait = 0 seconds
        fifo = true
        contentBasedDeduplication = false
    }

    # Default priority queue - for standard video processing, uploads
    "activesnap-default.fifo" {
        defaultVisibilityTimeout = 30 seconds
        delay = 0 seconds
        receiveMessageWait = 0 seconds
        fifo = true
        contentBasedDeduplication = false
    }

    # Low priority queue - for analytics, cleanup tasks
    "activesnap-low.fifo" {
        defaultVisibilityTimeout = 30 seconds
        delay = 0 seconds
        receiveMessageWait = 0 seconds
        fifo = true
        contentBasedDeduplication = false
    }

    # External CycleTrack outbound queue - for integration testing only
    # This simulates the external SQS_VIDEO_CREATED_QUEUE_URL that CycleTrack listens to
    "activesnap-video-created.fifo" {
        defaultVisibilityTimeout = 30 seconds
        delay = 0 seconds
        receiveMessageWait = 0 seconds
        fifo = true
        contentBasedDeduplication = false
    }

    # CycleTrack outbound queue - send video processing updates to CycleTrack
    # This is SQS_VIDEO_CREATED_QUEUE_URL - VideoSyncWorker listens to this queue
    "activesnap-og-video-created.fifo" {
        defaultVisibilityTimeout = 30 seconds
        delay = 0 seconds
        receiveMessageWait = 0 seconds
        fifo = true
        contentBasedDeduplication = false
    }

    # CycleTrack inbound queue - receives video processing updates from CycleTrack
    # This is SQS_VIDEO_UPDATES_QUEUE_URL - VideoSyncWorker listens to this queue
    "activesnap-og-video-update.fifo" {
        defaultVisibilityTimeout = 30 seconds
        delay = 0 seconds
        receiveMessageWait = 0 seconds
        fifo = true
        contentBasedDeduplication = false
    }

    # Test queue for integration tests
    "test-default.fifo" {
        defaultVisibilityTimeout = 30 seconds
        delay = 0 seconds
        receiveMessageWait = 0 seconds
        fifo = true
        contentBasedDeduplication = false
    }

    # Test queue for integration tests
    "test-activesnap-default.fifo" {
        defaultVisibilityTimeout = 30 seconds
        delay = 0 seconds
        receiveMessageWait = 0 seconds
        fifo = true
        contentBasedDeduplication = false
    }


    # Test queue for integration tests
    "test-activesnap-og-video-created.fifo" {
        defaultVisibilityTimeout = 30 seconds
        delay = 0 seconds
        receiveMessageWait = 0 seconds
        fifo = true
        contentBasedDeduplication = false
    }
}


# AWS configuration (required for SQS compatibility)
aws {
    region = elasticmq
    accountId = 000000000000
}
